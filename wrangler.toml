#:schema node_modules/wrangler/config-schema.json
name = "masani-dev"
compatibility_date = "2025-12-01"
workers_dev = false
preview_urls = false
routes = [
  { pattern = "masani.dev", custom_domain = true },
  { pattern = "www.masani.dev", custom_domain = true },
]

[assets]
directory = "./dist"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
